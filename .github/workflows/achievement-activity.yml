name: Achievement activity (Quickdraw, YOLO, PRs)

# Requires: Settings → Actions → General →
#   "Allow GitHub Actions to create and approve pull requests" = ON
# Optional: add repository secret GH_PAT (repo scope) if GITHUB_TOKEN is blocked.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/achievement-activity.yml"
      - ".github/trigger-achievements"

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  quickdraw:
    runs-on: ubuntu-latest
    steps:
      - name: Quickdraw — open and close issue within 5 minutes
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const issue = await github.rest.issues.create({
              owner,
              repo,
              title: "chore: quickdraw verification issue",
              body: "Automated issue for Quickdraw achievement. Closed immediately.",
            });
            await github.rest.issues.update({
              owner,
              repo,
              issue_number: issue.data.number,
              state: "closed",
            });
            core.info(`Quickdraw: closed issue #${issue.data.number}`);

  yolo-and-prs:
    runs-on: ubuntu-latest
    needs: quickdraw
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: YOLO and feature PRs
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require("fs");
            const { execSync } = require("child_process");
            const { owner, repo } = context.repo;

            async function mergePr(branch, title, prepare) {
              execSync(`git fetch origin main && git checkout -B ${branch} origin/main`);
              prepare();
              execSync("git add -A");
              try {
                execSync(`git commit -m "${title}"`);
              } catch {
                core.info(`No changes for ${branch}`);
                return;
              }
              execSync(`git push -f origin ${branch}`);
              const pr = await github.rest.pulls.create({
                owner, repo, title, head: branch, base: "main",
                body: "Automated PR for project activity.",
              });
              await new Promise((r) => setTimeout(r, 3000));
              await github.rest.pulls.merge({
                owner, repo, pull_number: pr.data.number, merge_method: "squash",
              });
              core.info(`Merged PR #${pr.data.number} (${branch})`);
            }

            // YOLO — merge without review (no reviewers requested)
            execSync("git fetch origin main && git checkout -B yolo/no-review-merge origin/main");
            fs.appendFileSync("docs/WIKI.md", "\n## YOLO\nMerged without review.\n");
            execSync("git add docs/WIKI.md && git commit -m 'docs: yolo merge test'");
            execSync("git push -f origin yolo/no-review-merge");
            const yoloPr = await github.rest.pulls.create({
              owner, repo,
              title: "docs: yolo merge without review",
              head: "yolo/no-review-merge",
              base: "main",
              body: "YOLO — merge without review.",
            });
            await github.rest.pulls.merge({
              owner, repo, pull_number: yoloPr.data.number, merge_method: "merge",
            });
            core.info(`YOLO: merged PR #${yoloPr.data.number}`);

            await mergePr("feature/workflow-multiply", "feat: extras multiply", () => {
              fs.writeFileSync("src/xr102232_test/extras.py", "def multiply(a, b):\n    return a * b\n");
            });

            await mergePr("feature/workflow-clamp", "feat: extras clamp", () => {
              const p = "src/xr102232_test/extras.py";
              const base = fs.existsSync(p) ? fs.readFileSync(p, "utf8") : "";
              fs.writeFileSync(p, base + "\ndef clamp(v, lo, hi):\n    return max(lo, min(hi, v))\n");
            });

            await mergePr("fix/workflow-parse-tabs", "test: parse_int tabs", () => {
              fs.appendFileSync("tests/test_core.py", "\n\ndef test_parse_int_tabs():\n    assert parse_int('\\t9\\t') == 9\n");
            });

            await mergePr("docs/workflow-achievements-link", "docs: achievements link", () => {
              fs.appendFileSync("README.md", "\n\nTracker: [ACHIEVEMENTS.md](ACHIEVEMENTS.md).\n");
            });

            await mergePr("chore/workflow-funding-note", "docs: sponsorship note", () => {
              fs.appendFileSync("CONTRIBUTING.md", "\n\n## Sponsorship\nGitHub Sponsors when available.\n");
            });
