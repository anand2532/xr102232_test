name: Setup repository features

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/setup-repo.yml"
      - ".github/trigger-setup"

permissions:
  administration: write
  contents: write

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Enable Discussions
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            await github.rest.repos.update({
              owner,
              repo,
              has_discussions: true,
            });
            core.info("Discussions enabled");

      - name: Configure Pages (gh-pages branch)
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            try {
              await github.rest.repos.createPagesSite({
                owner,
                repo,
                build_type: "legacy",
                source: { branch: "gh-pages", path: "/" },
              });
              core.info("Pages site created");
            } catch (e) {
              if (e.status === 409) {
                await github.rest.repos.updateInformationAboutPagesSite({
                  owner,
                  repo,
                  build_type: "legacy",
                  source: { branch: "gh-pages", path: "/" },
                });
                core.info("Pages site updated");
              } else {
                core.warning(`Pages config: ${e.message}`);
              }
            }
