name: Setup repository features

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/setup-repo.yml"
      - ".github/trigger-setup"

permissions:
  contents: write
  pages: write

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Enable Discussions
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            const { owner, repo } = context.repo;
            await github.rest.repos.update({
              owner,
              repo,
              has_discussions: true,
            });
            core.info("Discussions enabled (or already on)");

      - name: Configure Pages (gh-pages branch)
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            const { owner, repo } = context.repo;
            try {
              await github.rest.repos.createPagesSite({
                owner,
                repo,
                build_type: "legacy",
                source: { branch: "gh-pages", path: "/" },
              });
            } catch (e) {
              if (e.status === 409) {
                await github.rest.repos.updateInformationAboutPagesSite({
                  owner,
                  repo,
                  build_type: "legacy",
                  source: { branch: "gh-pages", path: "/" },
                });
              } else {
                core.warning(e.message);
              }
            }
